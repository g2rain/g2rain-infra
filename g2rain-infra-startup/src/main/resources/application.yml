server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: g2rain-infra
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB     # 单文件最大大小
      max-request-size: 10MB  # 总请求大小

  cloud:
    # http://192.168.1.20:8080/index.html#/register
    nacos:
      # 服务端地址
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      # 注册中心
      discovery:
        username: ${SPRING_CLOUD_NACOS_DISCOVERY_USERNAME:nacos}        # 注册中心用户
        password: ${SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD:g2rain_nacos} # 注册中心密码
        namespace: ${SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE:dev}        # 隔离命名空间
        group: g2rain                                                   # 服务分组, 微服务实例归属类别
        service: ${spring.application.name}                             # 服务名，方便注册和发现
        heart-beat-interval: 5000                                       # 服务实例心跳间隔时间(毫秒）
        heart-beat-timeout: 15000                                       # 服务实例心跳超时时间(毫秒）
      # 配置中心
      config:
        username: ${SPRING_CLOUD_NACOS_CONFIG_USERNAME:nacos}           # 配置中心用户
        password: ${SPRING_CLOUD_NACOS_CONFIG_PASSWORD:g2rain_nacos}    # 配置中心密码
        namespace: ${SPRING_CLOUD_NACOS_CONFIG_NAMESPACE:dev}           # 隔离命名空间
        group: ${spring.application.name}                               # 配置分组, 默认 DEFAULT_GROUP
        file-extension: yaml                                            # 配置文件的后缀名
        refresh-enabled: true                                           # 是否开启配置动态刷新
        max-retry: 3                                                    # 最大充实次数
        timeout: 5000                                                   # 获取配置的超时时间(毫秒)

    # syncer 消息通道
    stream:
      default-binder: redis
      output-bindings: output
      bindings:
        output:
          destination: g2rain-syncer

  # 外链 nacos 的配置中心的配置文件
  config:
    import:
      - optional:nacos:${spring.application.name}.yml?group=${spring.application.name}

## Mybatis
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    jdbc-type-for-null: NULL

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
